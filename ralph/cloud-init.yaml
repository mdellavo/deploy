- path: /opt/frink/docker-compose.yaml
  owner: root:root
  permissions: '0644'
  content: "version: \"3\"\nservices:\n  cadvisor:\n    container_name: cadvisor\n\
    \    image: gcr.io/cadvisor/cadvisor\n    volumes:\n      - /:/rootfs:ro\n   \
    \   - /var/run:/var/run:rw\n      - /sys:/sys:ro\n      - /var/lib/docker/:/var/lib/docker:ro\n\
    \    ports:\n      - \"8280:8080\"\n    restart: unless-stopped\n    logging:\n\
    \      driver: loki\n      options:\n        loki-url: \"http://100.82.224.98:3100/loki/api/v1/push\"\
    \n\n  postgres:\n    image: postgres\n    container_name: postgres\n    restart:\
    \ unless-stopped\n    volumes:\n      - postgres-data:/var/lib/postgresql/data\n\
    \    ports:\n      - \"5432:5432\"\n    environment:\n      POSTGRES_PASSWORD:\
    \ synapse\n      POSTGRES_USER: synapse\n      POSTGRES_DB: synapse\n      POSTGRES_INITDB_ARGS:\
    \ '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'\n    logging:\n      driver:\
    \ loki\n      options:\n        loki-url: \"http://100.82.224.98:3100/loki/api/v1/push\"\
    \n\n  synapse:\n    image: docker.io/matrixdotorg/synapse:latest\n    container_name:\
    \ synapse\n    restart: unless-stopped\n    environment:\n      - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml\n\
    \    volumes:\n      - ./synapse:/data\n    ports:\n      - \"8008:8008/tcp\"\n\
    \      - \"9000:9000/tcp\"\n    depends_on:\n      - postgres\n    logging:\n\
    \      driver: loki\n      options:\n        loki-url: \"http://100.82.224.98:3100/loki/api/v1/push\"\
    \n\n  rogue:\n    container_name: rogue\n    build: https://github.com/mdellavo/rogue.git\n\
    \    ports:\n      - 6543:6543\n\nvolumes:\n  postgres-data:\n"
- path: /root/setup-certs.sh
  owner: root:root
  permissions: '0755'
  content: "#!/bin/bash\n# Run after DNS is pointed at this instance and has propagated.\n\
    set -e\n\nEMAIL=\"marc.dellavolpe@gmail.com\"\nCERTS=(\n  \"quuux.org\"\n  \"\
    liminal.quuux.org\"\n  \"rogue.quuux.org\"\n  \"rogue-api.quuux.org\"\n  \"p.ound.town\"\
    \n)\n\n# Generate DH params for InspIRCd if not already present\nif [ ! -f /etc/inspircd/dhparams.pem\
    \ ]; then\n  openssl dhparam -out /etc/inspircd/dhparams.pem 2048\nfi\n\nfor domain\
    \ in \"${CERTS[@]}\"; do\n  certbot run --nginx -m \"$EMAIL\" --agree-tos -d \"\
    $domain\"\ndone\n\nsystemctl restart postfix\nsystemctl restart dovecot\nsystemctl\
    \ restart inspircd\nsystemctl restart nginx\n\necho \"Done. Certs provisioned\
    \ and services restarted.\"\n"
