#cloud-config
package_update: true
package_upgrade: true
debconf_selections: 'postfix postfix/main_mailer_type select Internet Site

  postfix postfix/mailname string quuux.org

  '
packages:
- man-db
- logrotate
- vim
- sudo
- bash-completion
- tmux
- ntp
- wget
- curl
- emacs-nox
- build-essential
- git
- jq
- mailutils
- nginx
- certbot
- python3-certbot-nginx
- postfix
- dovecot-core
- dovecot-imapd
- dovecot-pop3d
- dovecot-lmtpd
- inspircd
- openssl
- bpytop
- tree
- strace
- gdb
- htop
- dnsutils
runcmd:
- apt-get install -y ca-certificates curl gnupg
- install -m 0755 -d /etc/apt/keyrings
- curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
- chmod a+r /etc/apt/keyrings/docker.gpg
- echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
  https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
- apt-get update
- apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
- curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/$(lsb_release -cs).gpg | gpg
  --dearmor -o /etc/apt/keyrings/tailscale.gpg
- echo "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu
  $(lsb_release -cs) main" > /etc/apt/sources.list.d/tailscale.list
- apt-get update
- apt-get install -y tailscale
- systemctl enable --now docker
- docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions
- rm -f /etc/nginx/sites-enabled/default
- mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled /etc/nginx/conf.d
- mkdir -p /var/www/quuux.org /var/www/p.ound.town
- chown -R www-data:www-data /var/www
- ln -sf /etc/nginx/sites-available/quuux.org /etc/nginx/sites-enabled/quuux.org
- ln -sf /etc/nginx/sites-available/p.ound.town /etc/nginx/sites-enabled/p.ound.town
- ln -sf /etc/nginx/sites-available/liminal.quuux.org /etc/nginx/sites-enabled/liminal.quuux.org
- ln -sf /etc/nginx/sites-available/rogue.quuux.org /etc/nginx/sites-enabled/rogue.quuux.org
- ln -sf /etc/nginx/sites-available/rogue-api.quuux.org /etc/nginx/sites-enabled/rogue-api.quuux.org
- systemctl enable nginx
- echo "quuux.org" > /etc/mailname
- postmap /etc/postfix/virtual
- newaliases
- systemctl enable postfix
- systemctl enable --now dovecot
- systemctl enable --now inspircd
- systemctl enable --now tailscaled
- systemctl enable --now ntp
- mkdir -p /opt/frink/synapse
- cd /opt/frink && docker compose up -d
write_files:
- path: /etc/nginx/nginx.conf
  owner: root:root
  permissions: '0644'
  content: "user www-data;\nworker_processes auto;\nworker_cpu_affinity auto;\n\n\
    events {\n    multi_accept on;\n    worker_connections 1024;\n}\n\nhttp {\n  \
    \  charset utf-8;\n    sendfile on;\n    tcp_nopush on;\n    tcp_nodelay on;\n\
    \    server_tokens off;\n    types_hash_max_size 4096;\n    client_max_body_size\
    \ 16M;\n    gzip on;\n\n    proxy_cache_path /tmp/nginx/ levels=1:2 keys_zone=cache:10m\
    \ max_size=500m inactive=60m use_temp_path=off;\n\n    include mime.types;\n \
    \   default_type application/octet-stream;\n\n    log_format combined_upstream\
    \ '$remote_addr - $remote_user [$time_local] \"$host\" \"$request\" $status $body_bytes_sent\
    \ \"$http_referer\" \"$http_user_agent\" rt=$request_time uct=\"$upstream_connect_time\"\
    \ uht=\"$upstream_header_time\" urt=\"$upstream_response_time\"';\n\n    access_log\
    \ /var/log/nginx/access.log combined_upstream;\n    error_log /var/log/nginx/error.log\
    \ warn;\n\n    include /etc/nginx/conf.d/*.conf;\n    include /etc/nginx/sites-enabled/*;\n\
    }\n"
- path: /etc/nginx/sites-available/quuux.org
  owner: root:root
  permissions: '0644'
  content: "server {\n    listen 443 ssl;\n    server_name quuux.org;\n    root /var/www/quuux.org;\n\
    \    index index.html;\n\n    ssl_certificate /etc/letsencrypt/live/quuux.org/fullchain.pem;\n\
    \    ssl_certificate_key /etc/letsencrypt/live/quuux.org/privkey.pem;\n    include\
    \ /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\
    \n    location / {\n        try_files $uri $uri/ =404;\n    }\n}\n\nserver {\n\
    \    listen 80;\n    server_name quuux.org;\n\n    if ($host = quuux.org) {\n\
    \        return 301 https://$host$request_uri;\n    }\n\n    return 404;\n}\n"
- path: /etc/nginx/sites-available/p.ound.town
  owner: root:root
  permissions: '0644'
  content: "server {\n    listen 443 ssl;\n    listen 8448 ssl http2 default_server;\n\
    \    listen [::]:8448 ssl http2 default_server;\n    server_name p.ound.town;\n\
    \    root /var/www/p.ound.town;\n    index index.html;\n\n    ssl_certificate\
    \ /etc/letsencrypt/live/p.ound.town/fullchain.pem;\n    ssl_certificate_key /etc/letsencrypt/live/p.ound.town/privkey.pem;\n\
    \    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\
    \n    location /.well-known/matrix/server {\n        default_type application/json;\n\
    \        return 200 '{\"m.server\": \"p.ound.town:443\"}';\n    }\n\n    location\
    \ /.well-known/matrix/client {\n        default_type application/json;\n     \
    \   return 200 '{\"m.homeserver\":{\"base_url\": \"https://p.ound.town\"}}';\n\
    \    }\n\n    location ~ ^(/_matrix|/_synapse/client) {\n        proxy_pass http://localhost:8008;\n\
    \        proxy_set_header X-Forwarded-For $remote_addr;\n        proxy_set_header\
    \ X-Forwarded-Proto $scheme;\n        proxy_set_header Host $host;\n        client_max_body_size\
    \ 50M;\n    }\n\n    location / {\n        try_files $uri $uri/ =404;\n    }\n\
    }\n\nserver {\n    listen 80;\n    server_name p.ound.town;\n\n    if ($host =\
    \ p.ound.town) {\n        return 301 https://$host$request_uri;\n    }\n\n   \
    \ return 404;\n}\n"
- path: /etc/nginx/sites-available/liminal.quuux.org
  owner: root:root
  permissions: '0644'
  content: "server {\n    listen 443 ssl;\n    server_name liminal.quuux.org;\n\n\
    \    ssl_certificate /etc/letsencrypt/live/liminal.quuux.org/fullchain.pem;\n\
    \    ssl_certificate_key /etc/letsencrypt/live/liminal.quuux.org/privkey.pem;\n\
    \    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\
    \n    location / {\n        proxy_http_version     1.1;\n        proxy_set_header\
    \       Connection \"\";\n        proxy_set_header       Authorization '';\n \
    \       proxy_set_header       Host liminal.quuux.org.s3-website-us-east-1.amazonaws.com;\n\
    \        proxy_hide_header      x-amz-id-2;\n        proxy_hide_header      x-amz-request-id;\n\
    \        proxy_hide_header      x-amz-meta-server-side-encryption;\n        proxy_hide_header\
    \      x-amz-server-side-encryption;\n        proxy_hide_header      Set-Cookie;\n\
    \        proxy_ignore_headers   Set-Cookie;\n        proxy_cache_revalidate on;\n\
    \        proxy_intercept_errors on;\n        proxy_pass             http://liminal.quuux.org.s3-website-us-east-1.amazonaws.com;\n\
    \        proxy_cache            cache;\n        proxy_cache_valid      200 24h;\n\
    \        proxy_cache_valid      403 15m;\n        proxy_cache_use_stale  error\
    \ timeout updating http_500 http_502 http_503 http_504;\n        proxy_cache_lock\
    \       on;\n        proxy_cache_bypass     $http_cache_purge;\n        add_header\
    \             Cache-Control max-age=31536000;\n        add_header            \
    \ X-Cache-Status $upstream_cache_status;\n    }\n}\n\nserver {\n    listen 80;\n\
    \    server_name liminal.quuux.org;\n\n    if ($host = liminal.quuux.org) {\n\
    \        return 301 https://$host$request_uri;\n    }\n\n    return 404;\n}\n"
- path: /etc/nginx/sites-available/rogue.quuux.org
  owner: root:root
  permissions: '0644'
  content: "server {\n    listen 443 ssl;\n    server_name rogue.quuux.org;\n\n  \
