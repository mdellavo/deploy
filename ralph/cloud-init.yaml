    \    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\n    location / {\n    \
    \    proxy_http_version     1.1;\n        proxy_set_header       Connection \"\
    \";\n        proxy_set_header       Authorization '';\n        proxy_set_header\
    \       Host rogue.quuux.org.s3-website-us-east-1.amazonaws.com;\n        proxy_hide_header\
    \      x-amz-id-2;\n        proxy_hide_header      x-amz-request-id;\n       \
    \ proxy_hide_header      x-amz-meta-server-side-encryption;\n        proxy_hide_header\
    \      x-amz-server-side-encryption;\n        proxy_hide_header      Set-Cookie;\n\
    \        proxy_ignore_headers   Set-Cookie;\n        proxy_cache_revalidate on;\n\
    \        proxy_intercept_errors on;\n        proxy_pass             http://rogue.quuux.org.s3-website-us-east-1.amazonaws.com;\n\
    \        proxy_cache            cache;\n        proxy_cache_valid      200 24h;\n\
    \        proxy_cache_valid      403 15m;\n        proxy_cache_use_stale  error\
    \ timeout updating http_500 http_502 http_503 http_504;\n        proxy_cache_lock\
    \       on;\n        proxy_cache_bypass     $http_cache_purge;\n        add_header\
    \             Cache-Control max-age=31536000;\n        add_header            \
    \ X-Cache-Status $upstream_cache_status;\n    }\n}\n\nserver {\n    listen 80;\n\
    \    server_name rogue.quuux.org;\n\n    if ($host = rogue.quuux.org) {\n    \
    \    return 301 https://$host$request_uri;\n    }\n\n    return 404;\n}\n"
- path: /etc/nginx/sites-available/rogue-api.quuux.org
  owner: root:root
  permissions: '0644'
  content: "server {\n    listen 443 ssl;\n    server_name rogue-api.quuux.org;\n\n\
    \    ssl_certificate /etc/letsencrypt/live/rogue-api.quuux.org/fullchain.pem;\n\
    \    ssl_certificate_key /etc/letsencrypt/live/rogue-api.quuux.org/privkey.pem;\n\
    \    include /etc/letsencrypt/options-ssl-nginx.conf;\n    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;\n\
    \n    location / {\n        proxy_pass http://100.106.82.43:6543;\n        proxy_set_header\
    \ Host $host;\n        proxy_set_header X-Forwarded-For $remote_addr;\n      \
    \  proxy_http_version 1.1;\n        proxy_set_header Upgrade $http_upgrade;\n\
    \        proxy_set_header Connection \"upgrade\";\n        proxy_buffering off;\n\
    \        proxy_request_buffering off;\n    }\n}\n\nserver {\n    listen 80;\n\
    \    server_name rogue-api.quuux.org;\n\n    if ($host = rogue-api.quuux.org)\
    \ {\n        return 301 https://$host$request_uri;\n    }\n\n    return 404;\n\
    }\n"
- path: /etc/postfix/main.cf
  owner: root:root
  permissions: '0644'
  content: 'smtpd_banner = $myhostname ESMTP

    biff = no

    append_dot_mydomain = no

    readme_directory = no


    smtpd_tls_cert_file = /etc/letsencrypt/live/quuux.org/fullchain.pem

    smtpd_tls_key_file = /etc/letsencrypt/live/quuux.org/privkey.pem

    smtpd_use_tls = yes

    smtpd_tls_session_cache_database = btree:${data_directory}/smtpd_scache

    smtp_tls_session_cache_database = btree:${data_directory}/smtp_scache

    smtpd_tls_loglevel = 1

    smtpd_tls_security_level = may

    smtp_tls_security_level = may


    smtpd_relay_restrictions = permit_mynetworks permit_sasl_authenticated defer_unauth_destination


    # SASL auth via Dovecot

    smtpd_sasl_type = dovecot

    smtpd_sasl_path = private/auth

    smtpd_sasl_auth_enable = yes


    myhostname = quuux.org

    alias_maps = hash:/etc/aliases

    alias_database = hash:/etc/aliases

    myorigin = quuux.org

    mydomain = quuux.org

    mydestination = $myhostname, quuux.org, localhost.quuux.org, localhost

    relayhost =

    mynetworks = 127.0.0.0/8 [::ffff:127.0.0.0]/104 [::1]/128

    mailbox_size_limit = 0

    recipient_delimiter = +

    inet_interfaces = all

    inet_protocols = all


    # Virtual domain forwarding

    virtual_alias_domains = quuux.org marcdellavolpe.com

    virtual_alias_maps = hash:/etc/postfix/virtual


    # Local delivery via Dovecot LMTP

    mailbox_transport = lmtp:unix:private/dovecot-lmtp

    '
- path: /etc/postfix/virtual
  owner: root:root
  permissions: '0644'
  content: '@quuux.org marc.dellavolpe+quuux.org@gmail.com

    @marcdellavolpe.com marc.dellavolpe+marcdellavolpe.com@gmail.com

    '
- path: /etc/aliases
  owner: root:root
  permissions: '0644'
  content: 'root: marc.dellavolpe+root@gmail.com

    '
- path: /etc/dovecot/dovecot.conf
  owner: root:root
  permissions: '0644'
  content: "protocols = imap pop3 lmtp\nlisten = *, ::\n\nssl = required\nssl_cert\
    \ = </etc/letsencrypt/live/quuux.org/fullchain.pem\nssl_key = </etc/letsencrypt/live/quuux.org/privkey.pem\n\
    ssl_min_protocol = TLSv1.2\n\nmail_location = maildir:~/Maildir\nmail_privileged_group\
    \ = mail\n\nauth_mechanisms = plain login\n\npassdb {\n  driver = pam\n}\n\nuserdb\
    \ {\n  driver = passwd\n}\n\nservice lmtp {\n  unix_listener /var/spool/postfix/private/dovecot-lmtp\
    \ {\n    mode = 0600\n    user = postfix\n    group = postfix\n  }\n}\n\nservice\
    \ auth {\n  unix_listener /var/spool/postfix/private/auth {\n    mode = 0666\n\
    \    user = postfix\n    group = postfix\n  }\n  unix_listener auth-userdb {\n\
    \    mode = 0600\n  }\n}\n\nservice imap-login {\n  inet_listener imap {\n   \
    \ port = 143\n  }\n  inet_listener imaps {\n    port = 993\n    ssl = yes\n  }\n\
    }\n\nservice pop3-login {\n  inet_listener pop3 {\n    port = 110\n  }\n  inet_listener\
    \ pop3s {\n    port = 995\n    ssl = yes\n  }\n}\n"
