version: "3"
services:
    cadvisor:
        container_name: cadvisor
        image: gcr.io/cadvisor/cadvisor
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:rw
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
        ports:
            - "8280:8080"
        restart: unless-stopped
        logging:
          driver: loki
          options:
            loki-url: "http://apu.ts.quuux.org:3100/loki/api/v1/push"

    node_exporter:
        image: quay.io/prometheus/node-exporter:latest
        container_name: node_exporter
        command:
            - "--path.rootfs=/host"
        network_mode: host
        pid: host
        restart: unless-stopped
        volumes:
            - "/:/host:ro,rslave"
        logging:
          driver: loki
          options:
            loki-url: "http://apu.ts.quuux.org:3100/loki/api/v1/push"

    postgres_exporter:
        container_name: postgres_exporter
        image: quay.io/prometheuscommunity/postgres-exporter
        restart: unless-stopped
        ports:
            - "9187:9187"
        environment:
            DATA_SOURCE_URI: postgres.cdwstdw6yomy.us-east-1.rds.amazonaws.com
            DATA_SOURCE_USER: postgres
            DATA_SOURCE_PASS: postgrespassword
        logging:
          driver: loki
          options:
            loki-url: "http://apu.ts.quuux.org:3100/loki/api/v1/push"

    rds-exporter:
        container_name: rds-exporter
        image: public.ecr.aws/qonto/prometheus-rds-exporter:latest
        restart: unless-stopped
        ports:
            - "9043:9043"
        environment:
            AWS_REGION: us-east-1
        logging:
          driver: loki
          options:
            loki-url: "http://apu.ts.quuux.org:3100/loki/api/v1/push"
  
    synapse:
        image: docker.io/matrixdotorg/synapse:latest #4b9d0b35b3a3
        container_name: synapse
        restart: unless-stopped
        networks:
            - docker_network
        environment:
            - SYNAPSE_CONFIG_PATH=/data/homeserver.yaml
        volumes:
            - ./synapse:/data
            - synapse-media:/media_store
        ports:
            - "8008:8008/tcp"
            - "9000:9000/tcp"
        logging:
          driver: loki
          options:
            loki-url: "http://apu.ts.quuux.org:3100/loki/api/v1/push"

    rogue:
        container_name: rogue
        build: https://github.com/mdellavo/rogue.git
        ports:
            - 6543:6543
        logging:
          driver: loki
          options:
            loki-url: "http://apu.ts.quuux.org:3100/loki/api/v1/push"

