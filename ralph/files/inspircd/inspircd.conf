<config format="xml">

<server name="quuux.org"
        description="quuux IRC"
        network="quuux"
        id="1AA">

<admin name="marc"
       nick="marc"
       email="marc.dellavolpe@gmail.com">

<bind address="" port="6667" type="clients">
<bind address="" port="9999" type="clients" ssl="openssl">
<bind address="" port="7777" type="servers">

<openssl certfile="/etc/letsencrypt/live/quuux.org/fullchain.pem"
         keyfile="/etc/letsencrypt/live/quuux.org/privkey.pem"
         dhfile="/etc/inspircd/dhparams.pem"
         hash="sha256">

<connect allow="*"
         timeout="60"
         pingfreq="120"
         hardsendq="1M"
         softsendq="8192"
         recvq="8192"
         maxchans="30">

<cidr ipv4clone="32" ipv6clone="128">

<options prefixquit="Quit: "
         suffixquit=""
         prefixpart="&quot;"
         suffixpart="&quot;"
         fixedquit=""
         fixedpart=""
         syntaxhints="yes"
         cyclehosts="yes"
         cyclehostsfromuser="no"
         ircumsgprefix="no"
         announcets="yes"
         allowmismatch="no"
         defaultbind="auto"
         hostintopic="yes"
         pingwarning="15"
         serverpingfreq="60"
         defaultmodes="nt"
         moronbanner="You're banned!"
         exemptchanops=""
         invitebypassmodes="yes"
         nosnoticestack="no"
         welcomenotice="yes">

<performance netbuffersize="10240"
             maxwho="4096"
             somaxconn="128"
             softlimit="12800"
             quietbursts="yes"
             nouserdns="no">

<security allowcoreunload="no"
          hidewhois=""
          hidekills=""
          hideulinekills="yes"
          hidesplits="no"
          flatlinks="no"
          hideserver=""
          hidebans="no"
          restrictbannedusers="yes"
          genericoper="no"
          userstats="Pu">

<limits maxnick="32"
        maxchan="64"
        maxmodes="20"
        maxident="11"
        maxquit="255"
        maxtopic="307"
        maxkick="255"
        maxgecos="128"
        maxaway="200">

<log method="file" type="* -USERINPUT -USEROUTPUT" level="default" target="/var/log/inspircd/inspircd.log">

<oper name="marc"
      password="changeme"
      host="*@*"
      type="NetAdmin">

<type name="NetAdmin"
      classes="OperChat BanControl HostCloak Shutdown"
      vhost="quuux.org"
      snomask="*"
      modes="+s *">

<class name="OperChat"   commands="WALLOPS GLOBOPS">
<class name="BanControl" commands="KILL GLINE KLINE ZLINE QLINE ELINE TLINE RLINE CHECK NICKLOCK SHUN CLONES CBAN">
<class name="HostCloak"  commands="SETHOST SETIDENT SETNAME CHGHOST CHGIDENT">
<class name="Shutdown"   commands="DIE RESTART REHASH LOADMODULE UNLOADMODULE RELOADMODULE GUNLOADMODULE GRELOADMODULE">

<module name="account">
<module name="alias">
<module name="allowinvite">
<module name="auditorium">
<module name="banexception">
<module name="botmode">
<module name="cap">
<module name="cban">
<module name="chghost">
<module name="chgident">
<module name="cloaking">
<module name="conn_umodes">
<module name="dnsbl">
<module name="hostcycle">
<module name="inviteexception">
<module name="ircv3">
<module name="ircv3_capnotify">
<module name="ircv3_ctctags">
<module name="ircv3_echomessage">
<module name="ircv3_msgid">
<module name="ircv3_servertime">
<module name="knock">
<module name="messageflood">
<module name="noctcp">
<module name="ojoin">
<module name="operlog">
<module name="opermotd">
<module name="openssl">
<module name="password_hash">
<module name="regex_glob">
<module name="sasl">
<module name="securelist">
<module name="services_account">
<module name="sha256">
<module name="spanningtree">
<module name="swhois">
<module name="timedbans">
<module name="tline">
<module name="userip">
<module name="watch">

</config>
